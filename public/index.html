<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>MapTap BloNo</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://d.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://server.arcgisonline.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="MapTap Blono game">
        <header class="topbar">
          <div>
            <h1>MapTap BloNo</h1>
          </div>
          <div class="scorebox" aria-label="Current score">
            <span id="totalScore">0</span>
            <small>/ 500</small>
          </div>
        </header>

        <div class="status-grid">
          <div>
            <span class="label">Round</span>
            <strong id="roundLabel">1 / 5</strong>
          </div>
          <div>
            <span class="label">Target</span>
            <strong id="targetName">Loading...</strong>
          </div>
        </div>

        <div class="controls" aria-label="Game controls">
          <div class="layer-menu" id="layerMenu">
            <button
              id="layerToggle"
              class="layer-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="layerOptions"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 640"
                class="map-icon"
              >
                <!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                <path
                  d="M576 112C576 103.7 571.7 96 564.7 91.6C557.7 87.2 548.8 86.8 541.4 90.5L416.5 152.1L244 93.4C230.3 88.7 215.3 89.6 202.1 95.7L77.8 154.3C69.4 158.2 64 166.7 64 176L64 528C64 536.2 68.2 543.9 75.1 548.3C82 552.7 90.7 553.2 98.2 549.7L225.5 489.8L396.2 546.7C409.9 551.3 424.7 550.4 437.8 544.2L562.2 485.7C570.6 481.7 576 473.3 576 464L576 112zM208 146.1L208 445.1L112 490.3L112 191.3L208 146.1zM256 449.4L256 148.3L384 191.8L384 492.1L256 449.4zM432 198L528 150.6L528 448.8L432 494L432 198z"
                />
              </svg>
            </button>
            <div id="layerOptions" class="layer-options">
              <div class="segmented" role="group" aria-label="Map style">
                <button id="satelliteMode" class="active" type="button">
                  Satellite
                </button>
                <button id="mapMode" type="button">Map</button>
              </div>
            </div>
          </div>
          <button id="nextButton" class="primary" type="button" disabled>
            Next round
          </button>
        </div>
      </section>

      <section class="map-wrap" aria-label="Tap map">
        <div id="map"></div>
        <div id="tapPrompt" class="tap-prompt">
          Tap where you think the target is
        </div>
      </section>

      <section class="rounds" id="roundsPanel" aria-label="Round scores">
        <button
          id="roundsToggle"
          class="rounds-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="roundList"
        >
          <span>Rounds</span>
          <strong id="roundsSummary">0 / 500</strong>
        </button>
        <ol id="roundList"></ol>
      </section>
    </main>

    <template id="roundItemTemplate">
      <li>
        <span class="round-name"></span>
        <span class="round-score"></span>
      </li>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/locations.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
